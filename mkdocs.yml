site_name: BXI_Wiki
site_description: an example blog set up following the tutorial
site_url: https://wiki.bxirobotics.cn

theme:
  name: material
  icon:
    alternate: material/translate
  features:
    - navigation.tabs
    - navigation.top
  palette:
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: 切换到暗色模式

    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: 切换到亮色模式

extra:
  alternate:
    - name: 简体中文
      link: ./
      lang: zh
    - name: English
      link: /en/
      lang: en

repo_name: MineSunshineone/BXI_Wiki
repo_url: https://github.com/MineSunshineone/BXI_Wiki
edit_uri: edit/main/docs/

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: zh
          default: true
          name: 简体中文
        - locale: en
          name: English
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
